name: EdgePanelMobile
options:
  bundleIdPrefix: com.srivibhav.edgepanel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  EdgePanelMobile:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.srivibhav.edgepanel.mobile
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
