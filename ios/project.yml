name: EdgePanelMobile
options:
  bundleIdPrefix: com.srivibhav.edgepanel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
targets:
  EdgePanelMobile:
    type: application
    platform: iOS
    sources:
      - Sources
      - Shared
    dependencies:
      - target: EdgePanelWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.srivibhav.edgepanel.mobile
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        # Tier 2 push. Honored on device builds with your Apple Developer account;
        # ignored on unsigned simulator builds.
        CODE_SIGN_ENTITLEMENTS: EdgePanelMobile.entitlements

  EdgePanelWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.srivibhav.edgepanel.mobile.widgets
        INFOPLIST_FILE: Widgets/Info.plist
